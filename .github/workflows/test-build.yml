name: build test CI

on: push

jobs:
  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4.0.3
        with:
          node-version-file: './.tool-versions'

      - name: npm-install
        run: npm install
      
      - name: npm-build
        run: npm run build
